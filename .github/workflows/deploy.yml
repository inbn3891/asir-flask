name: Deploy Flask AI to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Docker build & push
      run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          # 빌드 대상을 flask-server 폴더로 지정합니다.
          docker build -t inbn3891/asir-flask:latest flask-server
          docker push inbn3891/asir-flask:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }} # Spring IP와 헷갈리지 않게 관리하세요!
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest
          docker stop asir-flask || true
          docker rm asir-flask || true
          # Flask는 기본적으로 5000번 포트를 사용하므로 -p 5000:5000 유지
          docker run -d --name asir-flask -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest