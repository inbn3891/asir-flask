name: Deploy Flask AI to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Docker build & push
      run: |
        docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        # 태그명에 :latest를 명시적으로 붙여주는 것이 관리에 유리합니다.
        docker build -t ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }} # Spring IP와 헷갈리지 않게 관리하세요!
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest
          docker stop asir-flask || true
          docker rm asir-flask || true
          # Flask는 기본적으로 5000번 포트를 사용하므로 -p 5000:5000 유지
          docker run -d --name asir-flask -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest