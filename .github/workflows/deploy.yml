name: Deploy Flask AI to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Docker build & push
      run: |
        docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        docker build -t ${{ secrets.DOCKER_USERNAME }}/asir-flask .
        docker push ${{ secrets.DOCKER_USERNAME }}/asir-flask

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}  # Flask 인스턴스의 퍼블릭 IP
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/asir-flask
          docker stop asir-flask || true
          docker rm asir-flask || true
          docker run -d --name asir-flask -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/asir-flask