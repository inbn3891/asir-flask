name: Deploy Flask AI to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # [추가] Docker Buildx 설치: 캐시 엔진을 활성화하기 위해 필수입니다.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # [추가] 도커 허브 로그인: 공식 액션을 사용하여 보안과 속도를 챙깁니다.
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # [수정] 빌드 & 푸시: 캐시가 없으면 생성하고, 있으면 재사용합니다.
    - name: Docker build & push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: inbn3891/asir-flask:latest
        # 캐시 설정: GitHub Actions 전용 저장소(gha)를 활용합니다.
        cache-from: type=gha
        cache-to: type=gha, mode=max

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. 안 쓰는 이미지 미리 삭제하여 용량 확보
          docker image prune -af

          # 2. 도커 허브 로그인 (EC2 내부)
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          # 3. 최신 이미지 가져오기 및 컨테이너 재시작
          docker pull inbn3891/asir-flask:latest
          docker stop asir-flask || true
          docker rm asir-flask || true
          docker run -d --name asir-flask -p 5000:5000 inbn3891/asir-flask:latest