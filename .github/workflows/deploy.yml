name: Deploy Flask AI to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Docker build & push
      run: |
        echo "=== [1] 현재 작업 디렉토리 확인 ==="
        pwd
        echo "=== [2] 현재 위치의 전체 파일 목록 ==="
        ls -al
        echo "=== [3] Dockerfile 내용 확인 (존재 여부 체크) ==="
        cat Dockerfile || echo "Dockerfile을 찾을 수 없습니다."
        
        # 여기서부터는 에러가 나더라도 목록 확인을 위해 로그를 남깁니다.
        docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        docker build -t inbn3891/asir-flask:latest .
        docker push inbn3891/asir-flask:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }} # Spring IP와 헷갈리지 않게 관리하세요!
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # EC2 서버에서도 도커 허브에 로그인해야 이미지를 가져올 수 있습니다.
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          docker pull ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest
          docker stop asir-flask || true
          docker rm asir-flask || true
          # Flask는 기본적으로 5000번 포트를 사용하므로 -p 5000:5000 유지
          docker run -d --name asir-flask -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/asir-flask:latest